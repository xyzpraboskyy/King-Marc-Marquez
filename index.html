<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus Slice Carousel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="carousel-container">
    <!-- Slice 1 (Active by default) -->
    <div class="slice active" style="--bg-img: url('https://i.pinimg.com/1200x/c5/e1/8d/c5e18dff2a89cc5246bb9bf75cf88d05.jpg');">
      <div class="overlay"></div>
      <div class="slice-content">
        <span class="number">01</span>
        <h3 class="title">Marc Marquez With Honda Racing Team</h3>
        <p class="description">BABY ALIEN</p>
      </div>
    </div>

    <!-- Slice 2 -->
    <div class="slice" style="--bg-img: url('https://i.pinimg.com/736x/00/c1/3b/00c13b0b40c3123a950011b3bd25a8cb.jpg');">
      <div class="overlay"></div>
      <div class="slice-content">
        <span class="number">02</span>
        <h3 class="title">Marc Marquez With Gresini team</h3>
        <p class="description">Marc Marquez won the Aragon GP after a 1,043-day drought</p>
      </div>
    </div>

    <!-- Slice 3 -->
    <div class="slice" style="--bg-img: url('https://i.pinimg.com/736x/0b/d7/6d/0bd76de630766538d4e6197771470458.jpg');">
      <div class="overlay"></div>
      <div class="slice-content">
        <span class="number">03</span>
        <h3 class="title">Spesial Livery Gresini</h3>
        <p class="description">Marc Marquez Wins the Misano Race in 2024</p>
      </div>
    </div>

    <!-- Slice 4 -->
    <div class="slice" style="--bg-img: url('https://wallpaperaccess.com/full/22223613.jpg');">
      <div class="overlay"></div>
      <div class="slice-content">
        <span class="number">04</span>
        <h3 class="title">DUCATI MONSTER</h3>
        <p class="description">Marc Marquez with Ducati 2025.</p>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
